<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kintoneプラグイン一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">[あなたの名前 / 屋号] のkintoneプラグイン</div>
      <nav>
        <a href="#plugin-list">プラグイン一覧</a>
        <a href="mailto:[お問い合わせ用メールアドレス]">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <section class="hero hero-list">
    <div class="container">
      <h1>kintoneをもっと使いやすくするプラグイン</h1>
      <p class="hero-sub">業務効率化に役立つkintoneプラグインを公開しています。気になるプラグインをクリックして詳細をご覧ください。</p>
    </div>
  </section>

  <section id="plugin-list" class="plugin-list-section">
    <div class="container">
      <h2>プラグイン一覧</h2>
      <div id="plugin-grid" class="plugin-grid">
        <!-- ここにJavaScriptでカードが自動生成されます -->
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 [あなたの名前 / 会社名]. All rights reserved.</p>
      <p><a href="[GitHubリポジトリのURL]">GitHubリポジトリ</a> | <a href="mailto:[お問い合わせ用メールアドレス]">お問い合わせ</a></p>
    </div>
  </footer>

  <script src="plugins-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
